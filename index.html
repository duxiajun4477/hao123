<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InfoVault 信息金库</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif;
      background: #0a0e1a; 
      color: #e5e8ee;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container { text-align: center; padding: 40px 20px; }
    .logo { 
      width: 80px; height: 80px; border-radius: 20px; 
      background: #3b6ef6; display: flex; align-items: center; 
      justify-content: center; margin: 0 auto 24px;
    }
    .logo svg { width: 40px; height: 40px; stroke: white; }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    p { color: #9aa3b4; margin-bottom: 32px; font-size: 15px; }
    .links { display: flex; flex-direction: column; gap: 12px; max-width: 300px; margin: 0 auto; }
    a {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 14px 24px; border-radius: 12px; font-size: 15px; font-weight: 600;
      text-decoration: none; transition: all 0.15s;
    }
    a.primary { background: #3b6ef6; color: white; }
    a.primary:hover { background: #2550e8; }
    a.secondary { background: #1a2035; color: #e5e8ee; border: 1px solid #2d3650; }
    a.secondary:hover { border-color: #3b6ef6; }
    .footer { margin-top: 32px; font-size: 12px; color: #5a6580; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
    </div>
    <h1>InfoVault</h1>
    <p>个人信息安全管家 · 端到端加密</p>
    <div class="links">
      <a href="info-vault-desktop/index.html" class="primary">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="14" height="20" x="5" y="2" rx="2" ry="2"/><line x1="12" y1="18" x2="12" y2="18"/></svg>
        桌面端入口
      </a>
      <a href="info-vault-mobile/index.html" class="secondary">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="14" height="20" x="5" y="2" rx="2" ry="2"/><line x1="12" y1="18" x2="12" y2="18"/></svg>
        移动端入口
      </a>
    </div>
    <div class="footer">
      🔐 数据加密存储 · GitHub 同步 · 全平台可用
    </div>
  </div>
</body>
</html>
