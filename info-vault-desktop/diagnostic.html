<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>InfoVault 诊断工具</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0e1a; color: #e5e8ee; font-family: system-ui, sans-serif; padding: 20px; }
.card { background: #1a2035; border: 1px solid #2d3650; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
h2 { font-size: 18px; margin-bottom: 12px; color: #3b6ef6; }
.step { padding: 12px 16px; background: #111827; border-radius: 8px; margin-bottom: 8px; border-left: 3px solid #3b6ef6; }
.step.done { border-left-color: #22c55e; }
.step.fail { border-left-color: #ef4444; }
code { background: #222a3e; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
.btn { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; margin: 4px; }
.btn-primary { background: #3b6ef6; color: white; }
.btn-danger { background: #ef4444; color: white; }
.result { margin-top: 8px; padding: 8px 12px; border-radius: 6px; font-size: 13px; }
.result.ok { background: rgba(34,197,94,0.1); color: #22c55e; }
.result.fail { background: rgba(239,68,68,0.1); color: #ef4444; }
pre { font-size: 12px; color: #9aa3b4; overflow: auto; max-height: 200px; margin-top: 8px; }
</style>
</head>
<body>
<h2>🔍 InfoVault 诊断工具</h2>
<p style="color:#9aa3b4;margin-bottom:20px;">此页面用于检测 IndexedDB 是否能正常读写数据</p>

<div id="step1" class="step">第1步：打开数据库...</div>
<div id="step2" class="step">第2步：等待中...</div>
<div id="step3" class="step">第3步：等待中...</div>
<div id="step4" class="step">第4步：等待中...</div>
<div id="step5" class="step">第5步：等待中...</div>

<div class="card">
  <h2>📋 手动操作</h2>
  <button class="btn btn-primary" onclick="addTestData()">➕ 添加测试数据</button>
  <button class="btn btn-primary" onclick="readAllData()">📖 读取全部数据</button>
  <button class="btn btn-danger" onclick="clearAll()">🗑️ 清除全部</button>
  <div id="manualResult"></div>
</div>

<script src="../info-vault/js/db.js?v=diag"></script>
<script>
const el = id => document.getElementById(id);
const setStep = (id, text, status = '') => {
  const step = el(id);
  step.innerHTML = text;
  step.className = 'step' + (status ? ' ' + status : '');
};

async function run() {
  try {
    setStep('step1', '✅ 第1步：数据库已打开');
    
    // 先清除旧测试数据
    const db = await InfoVaultDB.open();
    
    setStep('step2', '⏳ 第2步：正在写入测试数据...');
    
    // 写入一条测试数据
    const testEntry = {
      type: 'password',
      name: '测试网站',
      url: 'https://test.com',
      username: 'testuser',
      password: 'test123',
      category: '其他'
    };
    const saved = await InfoVaultDB.add(testEntry);
    
    setStep('step3', '✅ 第3步：数据已写入 (ID: ' + saved.id.slice(0,8) + '...)');
    
    // 立即读取
    const readBack = await InfoVaultDB.get(saved.id);
    if (readBack && readBack.name === '测试网站') {
      setStep('step4', '✅ 第4步：按ID读取成功 - 名称: ' + readBack.name, 'done');
    } else {
      setStep('step4', '❌ 第4步：按ID读取失败', 'fail');
    }
    
    // 按类型读取
    const allPasswords = await InfoVaultDB.getAll('password');
    if (allPasswords.length > 0) {
      setStep('step5', '✅ 第5步：按类型查询成功 - 找到 ' + allPasswords.length + ' 条密码', 'done');
    } else {
      setStep('step5', '❌ 第5步：按类型查询返回 0 条', 'fail');
    }
    
    // 清理测试数据
    await InfoVaultDB.delete(saved.id, true);
    
  } catch(e) {
    el('manualResult').innerHTML = '<div class="result fail">❌ 错误: ' + e.message + '</div>';
    setStep('step1', '❌ 第1步：打开失败', 'fail');
    setStep('step2', '❌ ' + e.message, 'fail');
  }
}

async function addTestData() {
  try {
    const r = await InfoVaultDB.add({ type: 'password', name: '手动测试_' + Date.now(), username: 'user', password: 'pwd' });
    el('manualResult').innerHTML = '<div class="result ok">✅ 已添加，ID: ' + r.id.slice(0,8) + '...</div>';
  } catch(e) {
    el('manualResult').innerHTML = '<div class="result fail">❌ ' + e.message + '</div>';
  }
}

async function readAllData() {
  try {
    const all = await InfoVaultDB.exportAll();
    const active = all.filter(e => !e.deletedAt);
    let html = '<div class="result ok">✅ 共 ' + all.length + ' 条（活跃: ' + active.length + '）</div>';
    html += '<pre>' + JSON.stringify(all.slice(0, 5), null, 2) + '</pre>';
    if (all.length > 5) html += '<p style="color:#5a6580;font-size:12px;">...还有 ' + (all.length - 5) + ' 条</p>';
    el('manualResult').innerHTML = html;
  } catch(e) {
    el('manualResult').innerHTML = '<div class="result fail">❌ ' + e.message + '</div>';
  }
}

async function clearAll() {
  if (!confirm('确定清除所有数据？')) return;
  try {
    const db = await InfoVaultDB.open();
    const tx = db.transaction('entries', 'readwrite');
    await new Promise((resolve, reject) => {
      const req = tx.objectStore('entries').clear();
      req.onsuccess = () => resolve();
      req.onerror = e => reject(e.target.error);
    });
    el('manualResult').innerHTML = '<div class="result ok">✅ 已清除全部数据</div>';
  } catch(e) {
    el('manualResult').innerHTML = '<div class="result fail">❌ ' + e.message + '</div>';
  }
}

run();
</script>
</body>
</html>
