<!-- Desktop App Shell -->
<div class="flex h-screen" style="font-family: var(--font-body);">

  <!-- Sidebar -->
  <aside class="flex flex-col w-[240px] min-w-[240px] h-full" style="background-color: var(--color-neutral-50);">

    <!-- Logo Area -->
    <div class="flex items-center gap-3 px-5 py-5">
      <div class="flex items-center justify-center w-9 h-9 rounded-lg" style="background-color: var(--color-primary-500);">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
      </div>
      <div>
        <div class="text-base font-semibold tracking-tight" style="color: var(--color-neutral-900);">InfoVault</div>
        <div class="text-xs" style="color: var(--color-neutral-500);">信息金库</div>
      </div>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 mt-2 px-3" data-sidebar-nav="global">
      <ul class="flex flex-col gap-1">

        <li>
          <a href="#" data-nav-key="dashboard" class="nav-item group flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-base" style="color: #3b6ef6; background-color: rgba(59, 110, 246, 0.1); border-left: 3px solid #3b6ef6;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect width="7" height="9" x="3" y="3" rx="1"/>
              <rect width="7" height="5" x="14" y="3" rx="1"/>
              <rect width="7" height="9" x="14" y="12" rx="1"/>
              <rect width="7" height="5" x="3" y="16" rx="1"/>
            </svg>
            <span>仪表盘</span>
          </a>
        </li>

        <li>
          <a href="#" data-nav-key="passwords" class="nav-item group flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-base" style="color: var(--color-neutral-600); border-left: 3px solid transparent;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="7.5" cy="15.5" r="5.5"/>
              <path d="m21 2-9.3 9.3"/>
              <path d="m18.4 4.6 1.6-1.6 1.6 1.6-1.6 1.6z"/>
            </svg>
            <span>密码管理</span>
          </a>
        </li>

        <li>
          <a href="#" data-nav-key="collectibles" class="nav-item group flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-base" style="color: var(--color-neutral-600); border-left: 3px solid transparent;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2h16Z"/>
              <path d="M2 10h20"/>
            </svg>
            <span>收藏管理</span>
          </a>
        </li>

        <li>
          <a href="#" data-nav-key="settings" class="nav-item group flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-base" style="color: var(--color-neutral-600); border-left: 3px solid transparent;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <span>设置</span>
          </a>
        </li>

      </ul>
    </nav>

    <!-- Sync Status -->
    <div class="flex items-center gap-2 px-5 py-4" style="border-top: 1px solid var(--color-neutral-300);">
      <span class="inline-block w-2 h-2 rounded-full" style="background-color: var(--state-success);"></span>
      <span class="text-xs" style="color: var(--color-neutral-500);">已同步 · 3分钟前</span>
    </div>

  </aside>

  <!-- Main Area -->
  <div class="flex-1 flex flex-col h-full" style="background-color: var(--color-neutral-0);">

    <!-- Top Bar -->
    <header class="flex items-center justify-between px-6 py-3.5" style="border-bottom: 1px solid var(--color-neutral-300); background-color: var(--color-neutral-50);">

      <!-- Search Bar -->
      <div class="flex items-center gap-2.5 flex-1 max-w-xl px-4 py-2 rounded-lg" style="background-color: var(--color-neutral-100); border: 1px solid var(--color-neutral-300);">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--color-neutral-500);">
          <circle cx="11" cy="11" r="8"/>
          <path d="m21 21-4.3-4.3"/>
        </svg>
        <input type="text" placeholder="搜索网站、账号、密码、证件..." class="flex-1 bg-transparent border-none outline-none text-sm" style="color: var(--color-neutral-900);" />
      </div>

      <!-- Right Actions -->
      <div class="flex items-center gap-4 ml-6">
        <!-- Notification -->
        <button class="relative flex items-center justify-center w-9 h-9 rounded-lg transition-base" style="color: var(--color-neutral-500);" onmouseover="this.style.backgroundColor='var(--color-neutral-200)'" onmouseout="this.style.backgroundColor='transparent'">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/>
            <path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/>
          </svg>
          <span class="absolute top-1.5 right-1.5 w-2 h-2 rounded-full" style="background-color: var(--color-primary-500);"></span>
        </button>

        <!-- User Avatar -->
        <button class="flex items-center justify-center w-9 h-9 rounded-full" style="background-color: var(--color-primary-500); color: #ffffff; font-size: var(--text-sm); font-weight: var(--font-semibold);">
          U
        </button>
      </div>

    </header>

    <!-- Page Content Slot -->
    <main id="page-content" class="flex-1 overflow-auto">
      <!-- SLOT: activeNavItem -->
    </main>

  </div>

</div>
