    <style id="theme-vars">
/* ============================================
   InfoVault - Personal Information Manager
   Brand CSS: Deep Tech Blue
   ============================================ */

:root {
  /* ---- Brand Primary (Cool Blue) ---- */
  --color-primary-50: #eef4ff;
  --color-primary-100: #dae6ff;
  --color-primary-200: #b8d0ff;
  --color-primary-300: #8db1ff;
  --color-primary-400: #5f8fff;
  --color-primary-500: #3b6ef6;
  --color-primary-600: #2550e8;
  --color-primary-700: #1d3dc7;
  --color-primary-800: #1a33a3;
  --color-primary-900: #1b2f87;
  --color-primary-950: #142157;

  /* ---- Neutral Scale (Cool Gray for dark UI) ---- */
  --color-neutral-0: #0a0e1a;
  --color-neutral-50: #111827;
  --color-neutral-100: #1a2035;
  --color-neutral-200: #222a3e;
  --color-neutral-300: #2d3650;
  --color-neutral-400: #3f4a63;
  --color-neutral-500: #5a6580;
  --color-neutral-600: #7a8599;
  --color-neutral-700: #9aa3b4;
  --color-neutral-800: #c1c7d4;
  --color-neutral-900: #e5e8ee;
  --color-neutral-950: #f3f4f8;

  /* ---- State Colors ---- */
  --state-success: #22c55e;
  --state-warning: #f59e0b;
  --state-error: #ef4444;
  --state-info: #3b82f6;

  /* ---- Semantic Aliases (Light) ---- */
  --info-vault-background: #0a0e1a;
  --info-vault-foreground: #e5e8ee;
  --info-vault-card: #1a2035;
  --info-vault-card-foreground: #e5e8ee;
  --info-vault-popover: #222a3e;
  --info-vault-popover-foreground: #e5e8ee;
  --info-vault-primary: #3b6ef6;
  --info-vault-primary-foreground: #ffffff;
  --info-vault-muted: #2d3650;
  --info-vault-muted-foreground: #9aa3b4;
  --info-vault-border: #2d3650;
  --info-vault-input: #1a2035;
  --info-vault-ring: #3b6ef6;

  /* ---- Radius ---- */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-full: 9999px;

  /* ---- Radius Semantic Aliases ---- */
  --info-vault-radius-sm: var(--radius-sm);
  --info-vault-radius-md: var(--radius-md);
  --info-vault-radius-lg: var(--radius-lg);

  /* ---- Typography ---- */
  --font-display: 'Inter', 'Noto Sans SC', system-ui, -apple-system, sans-serif;
  --font-body: 'Inter', 'Noto Sans SC', system-ui, -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', monospace;

  --text-xs: 0.75rem;
  --text-sm: 0.875rem;
  --text-base: 1rem;
  --text-lg: 1.125rem;
  --text-xl: 1.25rem;
  --text-2xl: 1.5rem;
  --text-3xl: 1.875rem;
  --text-4xl: 2.25rem;

  --leading-tight: 1.25;
  --leading-normal: 1.5;
  --leading-relaxed: 1.625;

  --font-light: 300;
  --font-normal: 400;
  --font-medium: 500;
  --font-semibold: 600;
  --font-bold: 700;
}

/* ---- Typography Classes ---- */
.font-display {
  font-family: var(--font-display);
}
.font-body {
  font-family: var(--font-body);
}
.font-mono {
  font-family: var(--font-mono);
}

.text-xs { font-size: var(--text-xs); line-height: var(--leading-normal); }
.text-sm { font-size: var(--text-sm); line-height: var(--leading-normal); }
.text-base { font-size: var(--text-base); line-height: var(--leading-normal); }
.text-lg { font-size: var(--text-lg); line-height: var(--leading-tight); }
.text-xl { font-size: var(--text-xl); line-height: var(--leading-tight); }
.text-2xl { font-size: var(--text-2xl); line-height: var(--leading-tight); }
.text-3xl { font-size: var(--text-3xl); line-height: var(--leading-tight); }
.text-4xl { font-size: var(--text-4xl); line-height: var(--leading-tight); }

.font-light { font-weight: var(--font-light); }
.font-normal { font-weight: var(--font-normal); }
.font-medium { font-weight: var(--font-medium); }
.font-semibold { font-weight: var(--font-semibold); }
.font-bold { font-weight: var(--font-bold); }

.leading-tight { line-height: var(--leading-tight); }
.leading-normal { line-height: var(--leading-normal); }
.leading-relaxed { line-height: var(--leading-relaxed); }

.tracking-tight { letter-spacing: -0.025em; }
.tracking-normal { letter-spacing: 0; }
.tracking-wide { letter-spacing: 0.025em; }

/* ---- Spacing Scale ---- */
.space-1 { margin: 0.25rem; }
.space-2 { margin: 0.5rem; }
.space-3 { margin: 0.75rem; }
.space-4 { margin: 1rem; }
.space-6 { margin: 1.5rem; }
.space-8 { margin: 2rem; }
.space-10 { margin: 2.5rem; }
.space-12 { margin: 3rem; }
.space-16 { margin: 4rem; }

.gap-1 { gap: 0.25rem; }
.gap-2 { gap: 0.5rem; }
.gap-3 { gap: 0.75rem; }
.gap-4 { gap: 1rem; }
.gap-6 { gap: 1.5rem; }
.gap-8 { gap: 2rem; }

.p-2 { padding: 0.5rem; }
.p-3 { padding: 0.75rem; }
.p-4 { padding: 1rem; }
.p-6 { padding: 1.5rem; }
.p-8 { padding: 2rem; }

/* ---- Shadow / Depth (Static surfaces use border, floating layers use subtle shadow) ---- */
.shadow-card {
  border: 1px solid var(--color-neutral-300);
  border-radius: var(--radius-md);
}
.shadow-float {
  box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
}

/* ---- Animation ---- */
.transition-base {
  transition: all 0.2s ease;
}

    </style>

    --color-card-foreground: var(--info-vault-card-foreground);

    --radius-sm: var(--info-vault-radius-sm);
    --radius-md: var(--info-vault-radius-md);
    --radius-lg: var(--info-vault-radius-lg);

  @layer base {
    body { background: var(--info-vault-background); color: var(--info-vault-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
